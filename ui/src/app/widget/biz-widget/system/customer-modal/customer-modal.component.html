<form nz-form [formGroup]="addEditForm">
  <nz-form-item>
    <nz-form-label nzFor="name" nzRequired [nzSm]="5" [nzXs]="24">客户名称</nz-form-label>
    <nz-form-control [nzErrorTip]="combineTpl" [nzSm]="17" [nzXs]="24">
      <input id="name" formControlName="name" nz-input placeholder="如：张三公司 / 某某工作室" maxlength="120" />
    </nz-form-control>
  </nz-form-item>

  <nz-form-item>
    <nz-form-label nzFor="contact" [nzSm]="5" [nzXs]="24">联系方式</nz-form-label>
    <nz-form-control [nzErrorTip]="combineTpl" [nzSm]="17" [nzXs]="24">
      <input id="contact" formControlName="contact" nz-input placeholder="Telegram / 邮箱 / 电话等自由文本" maxlength="255" />
    </nz-form-control>
  </nz-form-item>

  <nz-form-item>
    <nz-form-label nzFor="remark" [nzSm]="5" [nzXs]="24">备注</nz-form-label>
    <nz-form-control [nzErrorTip]="combineTpl" [nzSm]="17" [nzXs]="24">
      <textarea id="remark" formControlName="remark" nz-input rows="3" placeholder="合同号、销售、计费约定等" maxlength="2000"></textarea>
    </nz-form-control>
  </nz-form-item>

  @if (isEdit) {
    <nz-form-item>
      <nz-form-label nzFor="status" nzRequired [nzSm]="5" [nzXs]="24">账户状态</nz-form-label>
      <nz-form-control [nzErrorTip]="combineTpl" [nzSm]="17" [nzXs]="24">
        <nz-radio-group formControlName="status">
          <label nz-radio nzValue="active">正常</label>
          <label nz-radio nzValue="suspended">暂停</label>
        </nz-radio-group>
      </nz-form-control>
    </nz-form-item>
  }
</form>

<ng-template #combineTpl let-control>
  @if (control.hasError('required')) {
    必填项
  }
  @if (control.hasError('minlength')) {
    至少 {{ control.errors.minlength.requiredLength }} 个字符
  }
  @if (control.hasError('maxlength')) {
    最多 {{ control.errors.maxlength.requiredLength }} 个字符
  }
</ng-template>
