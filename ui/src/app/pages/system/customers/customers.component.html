<app-page-header [pageHeaderInfo]="pageHeaderInfo" />

<div class="normal-table-wrap">
  <nz-card class="m-b-10" nzHoverable [nzBodyStyle]="{ 'padding-bottom': 0 }">
    <form nz-form>
      <div nz-row [nzGutter]="{ xs: 8, sm: 16, md: 24 }">
        <div nz-col [nzLg]="8" [nzMd]="12" [nzSm]="24" [nzXl]="8" [nzXs]="24" [nzXXl]="8">
          <nz-form-item>
            <nz-form-label [nzFor]="''">客户名称</nz-form-label>
            <nz-form-control>
              <input name="name" nz-input placeholder="按名称搜索" [(ngModel)]="searchParam.name" />
            </nz-form-control>
          </nz-form-item>
        </div>

        <div nz-col [nzLg]="8" [nzMd]="12" [nzSm]="24" [nzXl]="8" [nzXs]="24" [nzXXl]="8">
          <nz-form-item>
            <nz-form-label [nzFor]="''">账户状态</nz-form-label>
            <nz-form-control>
              <nz-select name="status" [(ngModel)]="searchParam.status">
                @for (item of statusOptions; track item.value) {
                  <nz-option [nzLabel]="item.label" [nzValue]="item.value"></nz-option>
                }
              </nz-select>
            </nz-form-control>
          </nz-form-item>
        </div>

        <div class="text-right p-0 m-b-10" nz-col [nzLg]="8" [nzMd]="12" [nzSm]="24" [nzXl]="8" [nzXs]="24" [nzXXl]="8">
          <button nz-button nzType="primary" (click)="getDataList({ pageIndex: 1 })">
            <nz-icon nzType="search"></nz-icon>
            搜索
          </button>
          <button class="m-l-15" nz-button (click)="resetForm()">
            <nz-icon nzTheme="outline" nzType="close-circle"></nz-icon>
            重置
          </button>
        </div>
      </div>
    </form>
  </nz-card>

  <app-card-table-wrap [btnTpl]="tableBtns" [tableTitle]="'客户列表'" (reload)="reloadTable()">
    <app-ant-table
      [tableConfig]="tableConfig()"
      [tableData]="dataList()"
      (changePageIndex)="getDataList($event)"
      (changePageSize)="changePageSize($event)"
    ></app-ant-table>

    <ng-template #operationTpl let-$$dataItem="$$dataItem">
      <span *appAuth="ActionCode.CustomerEdit" class="operate-text" (click)="edit($$dataItem)">编辑</span>
      <span *appAuth="ActionCode.CustomerReveal" class="operate-text" (click)="viewInstallCommand($$dataItem)">安装命令</span>
      <span *appAuth="ActionCode.CustomerRevoke" class="operate-text" (click)="reissue($$dataItem)">重新颁发</span>
      <span *appAuth="ActionCode.CustomerRevoke" class="operate-text danger" (click)="revoke($$dataItem)">吊销</span>
    </ng-template>

    <ng-template #licenseStatusTpl let-hasActiveLicense="hasActiveLicense" let-activeLicenseKey="activeLicenseKey">
      @if (hasActiveLicense) {
        <nz-tag nzColor="success">有效</nz-tag>
        <span class="license-key">{{ activeLicenseKey }}</span>
      } @else {
        <nz-tag nzColor="default">未激活</nz-tag>
      }
    </ng-template>

    <ng-template #statusTpl let-status="status">
      @if (status === 'active') {
        <nz-tag nzColor="success">正常</nz-tag>
      } @else {
        <nz-tag nzColor="warning">暂停</nz-tag>
      }
    </ng-template>
  </app-card-table-wrap>

  <ng-template #tableBtns>
    <button *appAuth="ActionCode.CustomerAdd" class="m-r-8" nz-button nzType="primary" (click)="add()">
      <nz-icon nzType="plus"></nz-icon>
      新建客户
    </button>
  </ng-template>
</div>

<app-license-credential-drawer
  [visible]="drawerVisible()"
  [credential]="currentCredential"
  [title]="drawerTitle"
  [showSecret]="drawerShowSecret"
  (visibleChange)="onDrawerVisibleChange($event)"
></app-license-credential-drawer>
