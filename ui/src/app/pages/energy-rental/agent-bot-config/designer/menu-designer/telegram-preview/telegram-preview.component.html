<div class="tg-preview" [class.dark-mode]="$darkMode()" (click)="selectButton('')">
  <!-- Header：面包屑 + 主题切换 -->
  <div class="tg-header">
    <div class="tg-header-crumbs">
      <nz-breadcrumb nzSeparator=">" class="tg-breadcrumb">
        <nz-breadcrumb-item *ngFor="let crumb of $breadcrumb(); let i = index; let last = last">
          <a *ngIf="!last; else lastCrumb" (click)="navigateCrumb(i); $event.stopPropagation()">{{ crumb.label }}</a>
          <ng-template #lastCrumb>
            <span class="tg-breadcrumb-text">{{ crumb.label }}</span>
          </ng-template>
        </nz-breadcrumb-item>
      </nz-breadcrumb>
    </div>
    <button
      type="button"
      class="tg-theme-toggle"
      (click)="toggleDarkMode(); $event.stopPropagation()"
      [attr.aria-label]="$darkMode() ? '切换到浅色' : '切换到深色'"
      [title]="$darkMode() ? '切换到浅色' : '切换到深色'"
    >
      <span nz-icon [nzType]="$darkMode() ? 'bulb' : 'moon'" nzTheme="outline"></span>
    </button>
  </div>

  <!-- 聊天区域 -->
  <div class="tg-chat">
    <!-- Bot 气泡：welcomeText 或空态提示 -->
    <div class="tg-bot-bubble">{{ $bubbleText() }}</div>

    <!-- Inline Keyboard：子层 + 拖拽目标 -->
    <div class="tg-inline-keyboard" *ngIf="$isInline()">
      <div
        class="tg-inline-row"
        *ngFor="let row of $currentMenu(); let rowIdx = index; trackBy: trackByRowId"
        cdkDropList
        [id]="rowListId(rowIdx)"
        [cdkDropListData]="row.buttons"
        cdkDropListOrientation="horizontal"
        (cdkDropListDropped)="onDropToRow($event, rowIdx)"
      >
        <div
          *ngFor="let btn of row.buttons; trackBy: trackByButtonId"
          class="tg-inline-button"
          [class.is-selected]="$selectedId() === btn.id"
          [title]="getButtonTooltip(btn)"
          cdkDrag
          [cdkDragData]="btn"
          (click)="selectButton(btn.id, $event)"
          (dblclick)="enterButtonSubmenu(btn)"
        >
          <span class="tg-inline-button-text">{{ btn.text || '(未命名)' }}</span>
          <span
            *ngIf="btn.action === ButtonAction.SUBMENU"
            class="tg-inline-submenu-indicator"
            nz-icon
            nzType="right"
            nzTheme="outline"
            aria-hidden="true"
          ></span>
          <button
            type="button"
            class="tg-button-remove"
            nz-button
            nzType="text"
            nzSize="small"
            nz-popconfirm
            nzPopconfirmTitle="确定删除该按钮？"
            nzOkText="删除"
            nzCancelText="取消"
            (nzOnConfirm)="removeButton(btn.id)"
            (click)="$event.stopPropagation()"
            aria-label="删除按钮"
          >
            <span nz-icon nzType="close" nzTheme="outline"></span>
          </button>
        </div>
      </div>

      <!-- 空占位：子层无内容时，仍需一个落点让 palette 可拖入 -->
      <div
        class="tg-empty-row"
        *ngIf="$currentMenu().length === 0"
        cdkDropList
        [id]="newRowListId"
        [cdkDropListData]="emptyButtons"
        (cdkDropListDropped)="onDropToNewRow($event)"
      >
        <span class="tg-empty-hint">拖入组件开始设计...</span>
      </div>

      <!-- 新行落点 -->
      <div
        *ngIf="$canAddRow() && $currentMenu().length > 0"
        class="tg-new-row-slot"
        cdkDropList
        [id]="newRowListId"
        [cdkDropListData]="emptyButtons"
        (cdkDropListDropped)="onDropToNewRow($event)"
      >
        <span class="tg-new-row-hint">
          <span nz-icon nzType="plus" nzTheme="outline"></span>
          拖到此处新建一行
        </span>
      </div>
    </div>
  </div>

  <!-- Reply Keyboard：根层 + 拖拽目标 -->
  <div class="tg-reply-keyboard" *ngIf="!$isInline()">
    <div
      class="tg-reply-row"
      *ngFor="let row of $currentMenu(); let rowIdx = index; trackBy: trackByRowId"
      cdkDropList
      [id]="rowListId(rowIdx)"
      [cdkDropListData]="row.buttons"
      cdkDropListOrientation="horizontal"
      (cdkDropListDropped)="onDropToRow($event, rowIdx)"
    >
      <div
        *ngFor="let btn of row.buttons; trackBy: trackByButtonId"
        class="tg-reply-button"
        [class.is-selected]="$selectedId() === btn.id"
        [title]="getButtonTooltip(btn)"
        cdkDrag
        [cdkDragData]="btn"
        (click)="selectButton(btn.id, $event)"
        (dblclick)="enterButtonSubmenu(btn)"
      >
        <span class="tg-reply-button-text">{{ btn.text || '(未命名)' }}</span>
        <button
          type="button"
          class="tg-button-remove"
          nz-button
          nzType="text"
          nzSize="small"
          nz-popconfirm
          nzPopconfirmTitle="确定删除该按钮？"
          nzOkText="删除"
          nzCancelText="取消"
          (nzOnConfirm)="removeButton(btn.id)"
          (click)="$event.stopPropagation()"
          aria-label="删除按钮"
        >
          <span nz-icon nzType="close" nzTheme="outline"></span>
        </button>
      </div>
    </div>

    <!-- 根层空态落点 -->
    <div
      class="tg-empty-row"
      *ngIf="$currentMenu().length === 0"
      cdkDropList
      [id]="newRowListId"
      [cdkDropListData]="emptyButtons"
      (cdkDropListDropped)="onDropToNewRow($event)"
    >
      <span class="tg-empty-hint">拖入组件开始设计...</span>
    </div>

    <!-- 新行落点 -->
    <div
      *ngIf="$canAddRow() && $currentMenu().length > 0"
      class="tg-new-row-slot"
      cdkDropList
      [id]="newRowListId"
      [cdkDropListData]="emptyButtons"
      (cdkDropListDropped)="onDropToNewRow($event)"
    >
      <span class="tg-new-row-hint">
        <span nz-icon nzType="plus" nzTheme="outline"></span>
        拖到此处新建一行
      </span>
    </div>
  </div>
</div>
