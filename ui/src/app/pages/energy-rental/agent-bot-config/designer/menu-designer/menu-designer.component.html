<div class="designer-container" cdkDropListGroup>
  <!-- 工具栏 -->
  <div class="designer-toolbar">
    <div class="toolbar-left">
      <button
        nz-button
        nzType="primary"
        (click)="save()"
        [nzLoading]="$saving()"
        [disabled]="!$isDirty()"
      >
        <span nz-icon nzType="save" nzTheme="outline"></span>
        <span>保存菜单</span>
      </button>
      <button nz-button (click)="reset()" [disabled]="!$isDirty()">
        <span nz-icon nzType="reload" nzTheme="outline"></span>
        <span>重置</span>
      </button>
      <nz-divider nzType="vertical"></nz-divider>
      <button
        nz-button
        nzType="text"
        (click)="undo()"
        nz-tooltip
        nzTooltipTitle="撤销"
        aria-label="撤销"
      >
        <span nz-icon nzType="undo" nzTheme="outline"></span>
      </button>
      <button
        nz-button
        nzType="text"
        (click)="redo()"
        nz-tooltip
        nzTooltipTitle="重做"
        aria-label="重做"
      >
        <span nz-icon nzType="redo" nzTheme="outline"></span>
      </button>
    </div>
    <div class="toolbar-right">
      <nz-alert
        *ngIf="$validationError() as err"
        class="validation-alert"
        nzType="error"
        [nzMessage]="err"
        nzShowIcon
        nzBanner
      ></nz-alert>
      <span class="dirty-indicator" *ngIf="$isDirty()" aria-live="polite">
        <span nz-icon nzType="exclamation-circle" nzTheme="outline"></span>
        <span>有未保存更改</span>
      </span>
    </div>
  </div>

  <!-- 欢迎语编辑区（气泡正文） -->
  <div class="designer-welcome">
    <label class="welcome-label" for="designer-welcome-input">
      <span nz-icon nzType="message" nzTheme="outline"></span>
      欢迎语（机器人首条消息正文）
    </label>
    <textarea
      id="designer-welcome-input"
      nz-input
      rows="2"
      placeholder="例如：欢迎使用，请选择下方菜单..."
      [ngModel]="tree.$welcomeText()"
      (ngModelChange)="onWelcomeTextInput($event)"
      (blur)="onWelcomeTextBlur()"
    ></textarea>
  </div>

  <!-- 套餐组引导语编辑区 -->
  <div class="designer-pkg-group">
    <div class="pkg-group-header">
      <label class="pkg-group-label" for="designer-pkg-group-text-input">
        <span nz-icon nzType="shopping" nzTheme="outline"></span>
        套餐组引导语
      </label>
      <span class="pkg-group-hint">用户点击套餐组按钮后，套餐列表上方展示的提示文案</span>
    </div>
    <textarea
      id="designer-pkg-group-text-input"
      nz-input
      rows="2"
      placeholder="例如：欢迎选购能量套餐！请按需选择："
      [ngModel]="tree.$packageGroupText()"
      (ngModelChange)="onPackageGroupTextInput($event)"
      (blur)="onPackageGroupTextBlur()"
    ></textarea>
  </div>

  <!-- 三栏布局 -->
  <div class="designer-body">
    <app-component-palette class="panel-palette"></app-component-palette>
    <app-telegram-preview class="panel-preview"></app-telegram-preview>
    <app-property-panel class="panel-property" [agentId]="agentId()"></app-property-panel>
  </div>
</div>
