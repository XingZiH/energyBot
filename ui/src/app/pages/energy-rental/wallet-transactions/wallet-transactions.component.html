<app-page-header [pageHeaderInfo]="pageHeaderInfo" />

<div class="normal-table-wrap">
  <nz-card class="m-b-10" [nzBodyStyle]="{ 'padding-bottom': 0 }">
    <form nz-form>
      <div nz-row [nzGutter]="{ xs: 8, sm: 16, md: 24 }">
        <div nz-col [nzLg]="6" [nzSm]="12" [nzXs]="24">
          <nz-form-item>
            <nz-form-label>交易哈希</nz-form-label>
            <nz-form-control>
              <input name="txHash" nz-input placeholder="交易哈希" [(ngModel)]="searchParam.txHash" />
            </nz-form-control>
          </nz-form-item>
        </div>
        <div nz-col [nzLg]="6" [nzSm]="12" [nzXs]="24">
          <nz-form-item>
            <nz-form-label>钱包地址</nz-form-label>
            <nz-form-control>
              <input name="walletAddress" nz-input placeholder="钱包地址" [(ngModel)]="searchParam.walletAddress" />
            </nz-form-control>
          </nz-form-item>
        </div>
        <div nz-col [nzLg]="6" [nzSm]="12" [nzXs]="24">
          <nz-form-item>
            <nz-form-label>收支方向</nz-form-label>
            <nz-form-control>
              <nz-select name="direction" nzAllowClear nzPlaceHolder="请选择收支方向" [(ngModel)]="searchParam.direction">
                @for (item of directionOptions; track item.value) {
                  <nz-option [nzLabel]="item.label" [nzValue]="item.value"></nz-option>
                }
              </nz-select>
            </nz-form-control>
          </nz-form-item>
        </div>
        <div nz-col [nzLg]="6" [nzSm]="12" [nzXs]="24">
          <nz-form-item>
            <nz-form-label>状态</nz-form-label>
            <nz-form-control>
              <nz-select name="status" nzAllowClear nzPlaceHolder="请选择状态" [(ngModel)]="searchParam.status">
                @for (item of statusOptions; track item.value) {
                  <nz-option [nzLabel]="item.label" [nzValue]="item.value"></nz-option>
                }
              </nz-select>
            </nz-form-control>
          </nz-form-item>
        </div>
        <div class="text-right p-0 m-b-10" nz-col [nzSpan]="24">
          <button nz-button nzType="primary" (click)="getDataList({ pageIndex: 1 })">
            <i nz-icon nzType="search"></i>
            查询
          </button>
          <button class="m-l-15" nz-button (click)="resetForm()">
            <i nz-icon nzTheme="outline" nzType="close-circle"></i>
            重置
          </button>
        </div>
      </div>
    </form>
  </nz-card>

  <app-card-table-wrap [tableTitle]="'流水列表'" (reload)="reloadTable()">
    <app-ant-table [tableConfig]="tableConfig()" [tableData]="dataList()" (changePageIndex)="getDataList($event)" (changePageSize)="changePageSize($event)"></app-ant-table>
    <ng-template #trxTpl let-amountSun="amountSun">
      {{ sunToTrx(amountSun) }}
    </ng-template>
    <ng-template #directionTpl let-direction="direction">
      <nz-tag [nzColor]="directionColor(direction)">{{ directionText(direction) }}</nz-tag>
    </ng-template>
    <ng-template #typeTpl let-transactionType="transactionType">
      {{ transactionTypeText(transactionType) }}
    </ng-template>
    <ng-template #statusTpl let-status="status">
      <nz-tag [nzColor]="statusColor(status)">{{ statusText(status) }}</nz-tag>
    </ng-template>
  </app-card-table-wrap>
</div>
