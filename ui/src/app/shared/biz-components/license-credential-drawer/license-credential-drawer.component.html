<nz-drawer
  [nzClosable]="false"
  [nzMaskClosable]="false"
  [nzKeyboard]="false"
  [nzWidth]="580"
  [nzVisible]="visible()"
  [nzTitle]="title()"
  (nzOnClose)="onClose()"
>
  <ng-container *nzDrawerContent>
    @if (credential(); as cred) {
      <nz-alert
        nzType="warning"
        nzShowIcon
        nzMessage="仅本次可见"
        nzDescription="licenseSecret 是对称密钥，一旦关闭抽屉将无法再从后台查看。请立即复制并保存到安全位置（Bitwarden / 1Password 等）。"
      ></nz-alert>

      <nz-divider></nz-divider>

      <nz-descriptions nzBordered [nzColumn]="1" nzSize="small">
        <nz-descriptions-item nzTitle="License Key">
          <nz-space nzAlign="center">
            <nz-tag *nzSpaceItem nzColor="blue">
              <span class="mono">{{ cred.licenseKey }}</span>
            </nz-tag>
            <button *nzSpaceItem nz-button nzType="link" nzSize="small" (click)="copy(cred.licenseKey, 'License Key')">
              <nz-icon nzType="copy"></nz-icon>
              复制
            </button>
          </nz-space>
        </nz-descriptions-item>

        @if (showSecret() && cred.licenseSecret) {
          <nz-descriptions-item nzTitle="License Secret">
            <nz-space nzAlign="center">
              <span *nzSpaceItem class="mono secret-value">{{ cred.licenseSecret }}</span>
              <button *nzSpaceItem nz-button nzType="link" nzSize="small" (click)="copy(cred.licenseSecret, 'License Secret')">
                <nz-icon nzType="copy"></nz-icon>
                复制
              </button>
            </nz-space>
          </nz-descriptions-item>
        }
      </nz-descriptions>

      <nz-divider nzText="一键部署命令" nzOrientation="left"></nz-divider>

      <p class="install-tip">
        复制以下命令到目标服务器（root 用户）执行，将自动完成依赖安装、密钥注入与 systemd unit 注册。
      </p>

      <pre class="install-command">{{ cred.installCommand }}</pre>

      <nz-space>
        <button *nzSpaceItem nz-button nzType="primary" (click)="copy(cred.installCommand, '安装命令')">
          <nz-icon nzType="copy"></nz-icon>
          复制安装命令
        </button>
      </nz-space>

      <nz-divider></nz-divider>

      <label nz-checkbox [ngModel]="confirmed()" (ngModelChange)="confirmed.set($event)">
        我已安全保存 license 凭据，可以关闭抽屉
      </label>

      <div class="footer-actions">
        <button nz-button nzType="default" [disabled]="!canClose()" (click)="onClose()">关闭</button>
      </div>
    } @else {
      <nz-alert nzType="info" nzShowIcon nzMessage="无凭据数据" nzDescription="请确认操作是否成功；如需重新生成请使用【重新颁发】按钮。"></nz-alert>
    }
  </ng-container>
</nz-drawer>
