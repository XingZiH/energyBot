server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  # 健康检查 endpoint（Dockerfile HEALTHCHECK 用）
  location = /healthz {
    access_log off;
    return 200 "ok\n";
    default_type text/plain;
  }

  location = / {
    return 302 /ng-antd-admin/;
  }

  # 主题 CSS（dark.css / default.css）：文件名无 content hash，禁止长缓存
  location ~* ^/ng-antd-admin/(?:dark|default)\.css$ {
    expires 5m;
    add_header Cache-Control "public, must-revalidate" always;
    try_files $uri =404;
  }

  # 带哈希的静态资源：长缓存，不存在直接 404（不 fallback 到 index.html）
  location ~* ^/ng-antd-admin/.+\.(?:js|css|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|gif|webp|map)$ {
    expires 1y;
    add_header Cache-Control "public, immutable" always;
    try_files $uri =404;
  }

  # SPA 路由：index.html 不缓存，其它路径 fallback 到 SPA 入口
  location /ng-antd-admin/ {
    try_files $uri $uri/ /ng-antd-admin/index.html;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
  }

  # UI 侧 environment.prod.ts localUrl='/site/api'
  # 把 /site/api/* 剥前缀转给 nest-api（container_name=maer-energy-api，内部端口 3001）
  location /site/api/ {
    proxy_pass http://maer-energy-api:3001/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
  }
}
