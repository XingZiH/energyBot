# docker-compose.prod.yml
# 生产编排：ui (nginx) + nest-api + postgres （+ agent 反向通道走 nest-api /agent）
#
# B1 阶段服务清单：postgres + nest-api + ui。
# go-bot 服务在 B3 上线前保持注释，见 L67 注释块。
#
# 用法:
#   cp .env.example .env  # 然后填值
#   docker compose -p maer-energy -f docker-compose.prod.yml up -d
#
# 设计:
#   - 双网络: backend（内部通信）+ frontend（ui 对外）
#   - ui 与 nest-api 都绑 127.0.0.1 回环接口，由宿主机 cardshop-app nginx 反代
#     对外通过 https://www.feiyijt.com/ 暴露；老地址 http://47.82.151.0:18080 不再可用
#   - postgres 不暴露到宿主机
#   - UI_PORT / API_PORT 可在 .env 覆盖；默认 18080 / 13001 与 cardshop nginx 配置一致
#   - postgres 卷走 external: true 复用 A 版已有 maer-energy-postgres-data

services:
  postgres:
    # 固定 postgres:17-bookworm 与生产 maer-energy-postgres-data 卷版本一致
    # 生产卷由 docker-compose.yml (A 版) 初次创建时即为 v17；切不可改为更低版本
    image: postgres:17-bookworm
    container_name: maer-energy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 5

  nest-api:
    image: energybot-api:${IMAGE_TAG:-latest}
    container_name: maer-energy-api
    build:
      context: ./nest-api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      SECRET: ${JWT_SECRET}
      NODE_ENV: production
      PORT: 3001
      # License 子系统（子系统 A）：
      # - LICENSE_SECRET_ENC_KEY：AES-256-GCM 加密 licenses.secret_cipher 的主密钥
      #   生成：openssl rand -base64 32；32 字节（base64 44 字符，不算末尾 =）
      #   轮换：需要 re-encrypt 所有 licenses 行；当前阶段不支持热换
      LICENSE_SECRET_ENC_KEY: ${LICENSE_SECRET_ENC_KEY}
    ports:
      # 绑 127.0.0.1 回环：仅本机 cardshop-app nginx 通过 host.docker.internal 可达
      # 外网不可直连；API_PORT 默认 13001 与 deploy/www-feiyijt.conf 对应
      - "127.0.0.1:${API_PORT:-13001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
      - frontend
    # 说明：nest-api 当前没有 /health endpoint（侦察结果），
    # 暂不配 healthcheck；ui 反代时若 nest-api 未就绪会返回 502，
    # 待后续新增 /health 后再补。参考: src/enum/config.enum.ts

  # ===== go-bot（Telegram 业务机器人）=====
  # ⚠ B1 上线阶段暂不启动 go-bot：
  #   - B1 只需 api + ui + postgres + agent 反向通道
  #   - 老 A 版 bot 容器已废弃（硬编码配置 + 连已废弃的 ng-antd-admin-db）
  #   - go-bot 的 env 与平台配置迁移属 B3 范围，当前不回归上线
  # 当 B3 完成 go-bot 配置来源打通后，取消下面注释即可复用新 release。
  # go-bot:
  #   image: energybot-bot:${IMAGE_TAG:-latest}
  #   container_name: maer-energy-bot
  #   build:
  #     context: ./go-bot
  #     dockerfile: Dockerfile
  #   restart: unless-stopped
  #   environment:
  #     # 必填
  #     DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
  #     TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
  #     TRON_API_BASE_URL: ${TRON_API_BASE_URL}
  #     TRON_API_KEY: ${TRON_API_KEY}
  #     PLATFORM_RECEIVE_ADDRESS: ${PLATFORM_RECEIVE_ADDRESS}
  #     # 能量供应商：T12 后 catfee 是唯一 provider
  #     CATFEE_ENVIRONMENT: ${CATFEE_ENVIRONMENT:-nile}
  #     CATFEE_PROD_API_KEY: ${CATFEE_PROD_API_KEY:-}
  #     CATFEE_PROD_API_SECRET: ${CATFEE_PROD_API_SECRET:-}
  #     CATFEE_NILE_API_KEY: ${CATFEE_NILE_API_KEY:-}
  #     CATFEE_NILE_API_SECRET: ${CATFEE_NILE_API_SECRET:-}
  #     # 内部服务发现（docker DNS）
  #     NEST_API_URL: http://nest-api:3001
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     nest-api:
  #       condition: service_started
  #   networks:
  #     - backend

  ui:
    image: energybot-ui:${IMAGE_TAG:-latest}
    container_name: maer-energy-ui
    build:
      context: ./ui
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      # 绑 127.0.0.1 回环：仅本机 cardshop-app nginx 反代；外网不可直连 18080
      - "127.0.0.1:${UI_PORT:-18080}:80"
    depends_on:
      - nest-api
    networks:
      - frontend

volumes:
  # 复用 A 版已有卷 maer-energy-postgres-data（external: true 防止 Compose 新建空卷）
  # 首次部署 B1 前，必须先确认该卷存在：
  #   docker volume inspect maer-energy-postgres-data
  # 如不存在（全新机器），先创建：
  #   docker volume create maer-energy-postgres-data
  postgres-data:
    name: maer-energy-postgres-data
    external: true

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
