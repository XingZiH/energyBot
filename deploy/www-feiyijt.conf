# =============================================================================
# www.feiyijt.com 反向代理配置（cardshop-app nginx 容器内）
#
# 部署位置：cardshop-app 容器的 /etc/nginx/conf.d/www-feiyijt.conf
# 激活方式：docker exec cardshop-app nginx -t && nginx -s reload
#
# 前置：
#   1. Cloudflare Origin Cert 已落宿主机 /etc/nginx/ssl/feiyijt.com.{crt,key}
#      （644 / 600 owner=root；通过 cardshop-app 的现有 bind-mount 或再加 volume）
#   2. cardshop-app 容器已 bind-mount /opt/maer-energy/public → /var/www/feiyijt-public:ro
#   3. maer-energy compose 中 ui / api 都绑 127.0.0.1 回环：
#        ui  : 127.0.0.1:18080 → UI 静态资源（nginx 容器 /ng-antd-admin/）
#        api : 127.0.0.1:13001 → NestJS
#      cardshop-app 容器通过 host.docker.internal 访问（需在该服务 compose 中
#      加 `extra_hosts: ["host.docker.internal:host-gateway"]`，否则在 Linux 不生效）
#
# 路由职责：
#   /install.sh              →  静态脚本文件（alias）
#   /api/v1/license/*        →  公开 HMAC 端点，无 JWT，转发到 nest-api
#   /api/                    →  管理端 REST API，转发到 nest-api
#   /ws/                     →  B 阶段预留（WebSocket），转发到 nest-api
#   /                        →  Angular UI（自动加 /ng-antd-admin/ 前缀）
# =============================================================================

# 80 强制升级到 443（CF 橙云进来一般已 443，防止直访源站 HTTP）
server {
  listen 80;
  listen [::]:80;
  server_name www.feiyijt.com feiyijt.com;
  return 301 https://www.feiyijt.com$request_uri;
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name www.feiyijt.com;

  # Cloudflare Origin Cert（15 年期，SAN: *.feiyijt.com, feiyijt.com）
  ssl_certificate     /etc/nginx/ssl/feiyijt.com.crt;
  ssl_certificate_key /etc/nginx/ssl/feiyijt.com.key;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  # 客户端 body 上限：precheck 为空 body；管理端 API 可能上传头像等
  client_max_body_size 10m;

  # 访问日志单独打一条，方便排查
  access_log /var/log/nginx/www-feiyijt.access.log;
  error_log  /var/log/nginx/www-feiyijt.error.log warn;

  # ---------------------------------------------------------------------------
  # 一键安装脚本 —— 子系统 A 的核心对外产物
  # ---------------------------------------------------------------------------
  location = /install.sh {
    alias /var/www/feiyijt-public/install.sh;
    default_type text/x-shellscript;
    # 不缓存，便于热更新脚本内容；CF 侧也会遵循 no-store
    add_header Cache-Control "no-store" always;
    add_header X-Content-Type-Options "nosniff" always;
  }

  # 便于调试：/install.sh.sha256 返回脚本 SHA256 指纹（本阶段手工生成同名 .sha256 文件）
  location = /install.sh.sha256 {
    alias /var/www/feiyijt-public/install.sh.sha256;
    default_type text/plain;
    add_header Cache-Control "no-store" always;
  }

  # ---------------------------------------------------------------------------
  # License 公开端点 —— 客户机 install.sh HMAC 自证，无 JWT
  # ---------------------------------------------------------------------------
  location /api/v1/license/ {
    proxy_pass http://host.docker.internal:13001/api/v1/license/;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP         $remote_addr;
    # HMAC 4 header 透传（nginx 默认不会丢，显式写一遍便于排查）
    proxy_set_header X-License-Key  $http_x_license_key;
    proxy_set_header X-Timestamp    $http_x_timestamp;
    proxy_set_header X-Nonce        $http_x_nonce;
    proxy_set_header X-Signature    $http_x_signature;
    proxy_read_timeout 30s;
  }

  # ---------------------------------------------------------------------------
  # 管理端 REST API —— JWT + AuthGuard + Permission 三件套在 nest 内部把关
  # ---------------------------------------------------------------------------
  location /api/ {
    proxy_pass http://host.docker.internal:13001/api/;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_read_timeout 60s;
  }

  # ---------------------------------------------------------------------------
  # 子系统 B 预留：Agent 反向 WebSocket 通道
  # ---------------------------------------------------------------------------
  location /ws/ {
    proxy_pass http://host.docker.internal:13001/ws/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Real-IP         $remote_addr;
    # 长连接：1 小时内允许静默；agent 侧自己负责心跳
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # ---------------------------------------------------------------------------
  # Angular UI —— 容器内部 nginx 监听 /ng-antd-admin/，所以反代时补上前缀
  # 访问 https://www.feiyijt.com/  →  走到 /ng-antd-admin/ 并自动跳转
  # 访问 https://www.feiyijt.com/login/login-form  →  透传
  # ---------------------------------------------------------------------------
  location = / {
    return 302 /ng-antd-admin/;
  }

  location / {
    proxy_pass http://host.docker.internal:18080;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP         $remote_addr;
  }
}
