# =============================================================================
# www.feiyijt.com 反向代理配置（cardshop-app nginx 容器内）
#
# 部署位置：cardshop-app 容器 /etc/nginx/conf.d/www-feiyijt.conf
# 激活方式：docker exec cardshop-app nginx -t && nginx -s reload
#
# 前置：
#   1. Cloudflare Origin Cert 已落宿主 /etc/nginx/ssl/feiyijt.com.{crt,key}
#      cardshop-app 已 bind-mount /etc/nginx/ssl:/etc/nginx/ssl:ro
#   2. cardshop-app 加入 maer-energy-net 外部网络：
#        docker network connect maer-energy-net cardshop-app
#      并在 /opt/cardshop/docker-compose.yml 持久化：
#        networks:
#          app:
#            networks:
#              - cardshop
#              - maer-energy-net   # external: true
#   3. cardshop-app 自身 bind-mount /opt/maer-energy/public → /var/www/feiyijt-public:ro
#
# 上游命名：
#   maer-energy-api:3001  →  NestJS（容器内部端口 3001，对应 api.env 的 PORT=3001）
#   maer-energy-ui:80     →  Angular 静态 nginx（serve /ng-antd-admin/）
#
# 路由职责：
#   /install.sh              →  静态脚本文件
#   /install.sh.sha256       →  脚本指纹
#   /api/v1/license/*        →  HMAC 公开端点，无 JWT
#   /api/                    →  管理端 REST API，JWT + 权限守卫在 nest 内部
#   /ws/                     →  B 阶段预留（WebSocket）
#   /                        →  Angular UI，自动补 /ng-antd-admin/
# =============================================================================

# 80 强制升级到 443
server {
  listen 80;
  listen [::]:80;
  server_name www.feiyijt.com feiyijt.com;
  return 301 https://www.feiyijt.com$request_uri;
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name www.feiyijt.com;

  # Cloudflare Origin Cert（15 年期，SAN: *.feiyijt.com, feiyijt.com）
  ssl_certificate     /etc/nginx/ssl/feiyijt.com.crt;
  ssl_certificate_key /etc/nginx/ssl/feiyijt.com.key;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  # Docker 内置 DNS，避免 nginx 启动时上游未就绪导致 resolve 失败
  resolver 127.0.0.11 valid=30s ipv6=off;

  client_max_body_size 10m;

  access_log /var/log/nginx/www-feiyijt.access.log;
  error_log  /var/log/nginx/www-feiyijt.error.log warn;

  # ---------------------------------------------------------------------------
  # 一键安装脚本
  # ---------------------------------------------------------------------------
  location = /install.sh {
    alias /var/www/feiyijt-public/install.sh;
    default_type text/x-shellscript;
    add_header Cache-Control "no-store" always;
    add_header X-Content-Type-Options "nosniff" always;
  }

  location = /install.sh.sha256 {
    alias /var/www/feiyijt-public/install.sh.sha256;
    default_type text/plain;
    add_header Cache-Control "no-store" always;
  }

  # ---------------------------------------------------------------------------
  # License 公开端点
  # ---------------------------------------------------------------------------
  location /api/v1/license/ {
    # 用 set 触发运行时 DNS 解析（resolver 生效），容器先起来再解析上游
    set $upstream_api http://maer-energy-api:3001;
    proxy_pass $upstream_api;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP         $remote_addr;
    # HMAC header 透传（nginx 默认透传，显式写一遍便于排查）
    proxy_set_header X-License-Key  $http_x_license_key;
    proxy_set_header X-Timestamp    $http_x_timestamp;
    proxy_set_header X-Nonce        $http_x_nonce;
    proxy_set_header X-Signature    $http_x_signature;
    proxy_read_timeout 30s;
  }

  # ---------------------------------------------------------------------------
  # 管理端 REST API
  # ---------------------------------------------------------------------------
  location /api/ {
    set $upstream_api http://maer-energy-api:3001;
    proxy_pass $upstream_api;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_read_timeout 60s;
  }

  # ---------------------------------------------------------------------------
  # 子系统 B 预留：Agent 反向 WebSocket
  # ---------------------------------------------------------------------------
  location /ws/ {
    set $upstream_ws http://maer-energy-api:3001;
    proxy_pass $upstream_ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # ---------------------------------------------------------------------------
  # Agent 反向 WebSocket（子系统 B1）
  #   Go agent 连 wss://www.feiyijt.com/agent，带 5 个 X-* HMAC headers
  # ---------------------------------------------------------------------------
  location = /agent {
    set $upstream_agent http://maer-energy-api:3001;
    proxy_pass $upstream_agent;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    # HMAC headers 透传（nginx 默认即透传，显式写避免日后改 underscores_in_headers 等导致丢失）
    proxy_set_header X-License-Key   $http_x_license_key;
    proxy_set_header X-Timestamp     $http_x_timestamp;
    proxy_set_header X-Nonce         $http_x_nonce;
    proxy_set_header X-Signature     $http_x_signature;
    proxy_set_header X-Agent-Version $http_x_agent_version;
    # 长连接：心跳 30s，2 分钟给服务端 90s 离线判定留足窗口
    proxy_read_timeout  3600s;
    proxy_send_timeout  3600s;
  }

  # ---------------------------------------------------------------------------
  # Agent 二进制分发（install.sh 拉取）
  # ---------------------------------------------------------------------------
  location /bin/ {
    alias /var/www/feiyijt-public/bin/;
    autoindex off;
    default_type application/octet-stream;
    add_header X-Content-Type-Options "nosniff" always;
    # 允许 curl -O 按原名保存
    add_header Content-Disposition "attachment" always;
  }

  # ---------------------------------------------------------------------------
  # systemd unit 分发（install.sh 拉取）
  # ---------------------------------------------------------------------------
  location /systemd/ {
    alias /var/www/feiyijt-public/systemd/;
    autoindex off;
    default_type text/plain;
    add_header X-Content-Type-Options "nosniff" always;
  }

  # ---------------------------------------------------------------------------
  # Angular UI
  #   UI 容器内部 nginx 监听 /ng-antd-admin/；根访问 302 过去
  # ---------------------------------------------------------------------------
  location = / {
    return 302 /ng-antd-admin/;
  }

  location / {
    set $upstream_ui http://maer-energy-ui:80;
    proxy_pass $upstream_ui;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP         $remote_addr;
  }
}
